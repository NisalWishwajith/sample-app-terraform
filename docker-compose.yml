services:
  mysql:
    image: "mysql:latest"
    container_name: mysql-flaskapp
    volumes:
      - dbdata:/var/lib/mysql
    env_file:
      - .env
    
  flaskapp:
    build: ./FlaskApp
    container_name: flaskapp
    volumes:
      - ./FlaskApp:/app
    ports:
      - "5000:5000"

  caddy:
    image: "caddy:alpine"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile

volumes:
  dbdata:

networks:
  app-network:
    driver: bridge